<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500" font-family="Georgia, 'Times New Roman', serif">
  <rect width="760" height="500" fill="#ffffff"/>

  <!-- Title -->
  <text x="60" y="46" font-size="21" font-weight="700" fill="#1c2431">ETF price vs. net asset value under stress</text>
  <text x="60" y="70" font-size="14" fill="#6b7280" font-family="Inter, sans-serif">Schematic: the dislocation the paper measures</text>

  <!-- Stress window shading -->
  <rect x="368" y="95" width="150" height="320" fill="#c9a86a" opacity="0.14"/>
  <text x="443" y="115" font-size="12.5" fill="#9a7b3d" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600">stress window</text>

  <!-- Axes -->
  <line x1="60" y1="415" x2="710" y2="415" stroke="#c9c4ba" stroke-width="1.5"/>
  <line x1="60" y1="95" x2="60" y2="415" stroke="#c9c4ba" stroke-width="1.5"/>
  <text x="384" y="452" font-size="13" fill="#6b7280" text-anchor="middle" font-family="Inter, sans-serif">time</text>
  <text x="30" y="255" font-size="13" fill="#6b7280" text-anchor="middle" font-family="Inter, sans-serif" transform="rotate(-90 30 255)">price level</text>

  <!-- NAV line: steady fair value -->
  <path d="M 60 300 L 240 292 L 368 285 L 443 300 L 518 280 L 640 270 L 710 268"
        fill="none" stroke="#1e3a5f" stroke-width="3"/>

  <!-- Market price: tracks NAV in calm, gaps into premium then discount during stress -->
  <path d="M 60 302 L 240 290 L 368 284 L 400 235 L 443 222 L 480 330 L 518 352 L 570 300 L 640 272 L 710 268"
        fill="none" stroke="#c9a86a" stroke-width="3"/>

  <!-- Gap annotation (premium) -->
  <line x1="443" y1="222" x2="443" y2="298" stroke="#a8505e" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="452" y="200" font-size="12.5" fill="#a8505e" font-family="Inter, sans-serif" font-weight="600">premium</text>

  <!-- Gap annotation (discount) -->
  <line x1="500" y1="290" x2="500" y2="343" stroke="#a8505e" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="508" y="372" font-size="12.5" fill="#a8505e" font-family="Inter, sans-serif" font-weight="600">discount</text>

  <!-- Legend -->
  <g font-family="Inter, sans-serif" font-size="13.5">
    <line x1="470" y1="475" x2="500" y2="475" stroke="#1e3a5f" stroke-width="3"/>
    <text x="508" y="480" fill="#1c2431">NAV (fair value)</text>
    <line x1="620" y1="475" x2="650" y2="475" stroke="#c9a86a" stroke-width="3"/>
    <text x="658" y="480" fill="#1c2431">ETF price</text>
  </g>
</svg>
